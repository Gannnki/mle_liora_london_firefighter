models:

  - name: XGBoost
    type: XGBRegressor
    params:
      random_state: 42
      n_jobs: -1
      tree_method: hist
      #for categorical encoding here: true, and use in pipeline_config.yaml CATEGORY_KEEP
      enable_categorical: false
      # changed from reg:squarederror to reg:absoluteerror
      objective: reg:squarederror 
      eval_metric: mae
      early_stopping_rounds: 50 
      colsample_bytree: 0.85
      gamma: 0
      learning_rate: 0.04
      max_depth: 8
      min_child_weight: 5
      n_estimators: 3000
      reg_alpha: 0
      reg_lambda: 0.5
      subsample: 0.85
    #grid_search:
    #  enabled: true 
    #  method: "grid"
    #  cv: 3
    #  scoring: "neg_mean_absolute_error"
    #  param_grid:
    #    max_depth: [6,8]
    #    learning_rate: [0.04,0.1]
    # best params wurden von gridsearch auf learning rate 0.1 und max depth auf 8 gesetzt