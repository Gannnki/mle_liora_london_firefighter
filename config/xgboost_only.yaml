models:

  - name: XGBoost
    type: XGBRegressor
    params:
      random_state: 42
      n_jobs: -1
      tree_method: hist
      objective: reg:squarederror
      eval_metric: mae
      colsample_bytree: 0.85
      gamma: 0
      learning_rate: 0.04
      max_depth: 8
      min_child_weight: 2
      n_estimators: 900
      reg_alpha: 0
      reg_lambda: 0.5
      subsample: 0.85