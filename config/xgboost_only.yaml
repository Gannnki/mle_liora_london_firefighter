models:

  - name: XGBoost
    type: XGBRegressor
    params:
      random_state: 42
      n_jobs: -1
      tree_method: hist
      objective: reg:squarederror
      eval_metric: mae
      learning_rate: 0.03
      max_depth: 6
      min_child_weight: 2
      gamma: 0
      n_estimators: 5000
      reg_alpha: 0
      reg_lambda: 1
      subsample: 0.9
      colsample_bytree: 0.9
      colsample_bylevel: 0.9
