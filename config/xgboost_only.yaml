models:
  - name: XGBoost_fast
    type: XGBRegressor
    params:
      random_state: 42
      n_jobs: -1
      tree_method: hist
      objective: reg:squarederror
      eval_metric: mae
      learning_rate: 0.015
      max_depth: 8
      min_child_weight: 6
      gamma: 0.1
      n_estimators: 5000
      reg_alpha: 0.1
      reg_lambda: 9
      subsample: 0.85
      colsample_bytree: 0.85
      colsample_bylevel: 0.8
    grid_search:
      enabled: false
      method: randomized
      n_iter: 12
      cv: 2
      search_sample_rows: 180000
      scoring: neg_mean_absolute_error
      n_jobs: 1
      verbose: 2
      random_state: 42
      param_distributions:
        learning_rate: [0.015, 0.02, 0.025, 0.03]
        max_depth: [6, 7, 8, 9]
        min_child_weight: [3, 4, 6, 8, 10]
        gamma: [0, 0.02, 0.05, 0.1]
        n_estimators: [2500, 3500, 5000]
        reg_alpha: [0, 0.05, 0.1, 0.3]
        reg_lambda: [3, 4, 5, 7, 9]
        subsample: [0.8, 0.85, 0.9, 0.95]
        colsample_bytree: [0.8, 0.85, 0.9, 0.95]
        colsample_bylevel: [0.8, 0.9, 1.0]
